name: Docker Deployment

on:
  push:
    branches:
      - kan-ploclo

jobs:
  Build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Clean Docker Image
        run: |
         docker image prune -a -f

      - name: Build and Push Backend
        run: |
         docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./PLOCLO_cms/backend
         docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build and Push Frontend
        run: |
         docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./PLOCLO_cms/frontend
         docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Create .env file
        working-directory: ./PLOCLO_cms
        run: |
         cat > .env << EOF
         DB_HOST=${{ secrets.DB_HOST }}
         DB_PORT=${{ secrets.DB_PORT }}
         DB_USER=${{ secrets.DB_USER }}
         DB_PASSWORD=${{ secrets.DB_PASSWORD }}
         DB_NAME=${{ secrets.DB_NAME }}
         JWT_SECRET=${{ secrets.JWT_SECRET }}
         DATABASE_URL=${{ secrets.DATABASE_URL }}
         GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
         GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
         GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }}
         NODE_ENV=${{ secrets.NODE_ENV }}
         NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
         EOF

      - name: Deploy with docker compose
        working-directory: ./PLOCLO_cms
        run: |
         docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
         docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
         docker compose up -d --build

      