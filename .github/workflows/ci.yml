name: workflow-tmas-scan

on:
  push:
      branches:
          - main
          
jobs:
    TMAS-SCAN:
        runs-on: ubuntu-latest
        steps:
            - name: CheckOut
              uses: actions/checkout@v4
              with:
               submodules: false

            - name: Sonarqube
              uses: SonarSource/sonarqube-scan-action@v4
              with:
               projectBaseDir: PLOCLO_cms-main
              env:
                SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
                SONAR_TOKEN: ${{ secrets.SONAR_TOKEN}}

            - name: Login To Docker
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Clean Docker
              run: docker system prune -af

            - name: Build Docker Images
              run: |
               docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest ./PLOCLO_cms-main/backend
               docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest ./PLOCLO_cms-main/frontend

            - name: Push Docker Image
              run: |
               docker push ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
               docker push ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest

            - name: Scan Backend Image
              uses: trendmicro/tmas-scan-action@v3.1.0
              with:
                 version: 'latest'
                 vulnerabilitiesScan: true
                 malwareScan: false
                 artifact: registry:${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
                 additionalArgs: --region=ap-southeast-1
                 tmasApiKey: ${{ secrets.VISION_ONE_API_KEY }}
                 githubToken: ${{ secrets.GITHUB_TOKEN }}

            - name: Scan Frontend Image
              uses: trendmicro/tmas-scan-action@v3.1.0
              with:
               version: 'latest'
               vulnerabilitiesScan: true
               malwareScan: false
               artifact: registry:${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest
               additionalArgs: --region=ap-southeast-1
               tmasApiKey: ${{ secrets.VISION_ONE_API_KEY }}
               githubToken: ${{ secrets.GITHUB_TOKEN }}


    deploy:
       runs-on: self-hosted
       needs: TMAS-SCAN
       steps:

            - name: Checkout Code
              uses: actions/checkout@v4
              with:
               submodules: true

            - name: Check minikube Status
              run: |
               minikube status
               kubectl cluster-info

            - name: Pull images
              run: |
               docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest
               docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest

            - name: Apply manifests & Deploy to minikube
              run: |
               kubectl apply -f PLOCLO_cms-main/k8s/backend-deployment.yaml
               kubectl apply -f PLOCLO_cms-main/k8s/frontend-deployment.yaml

               kubectl set image deployment/frontend \
               frontend=${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest

               kubectl set image deployment/backend \
               backend=${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest

               kubectl rollout status deployment/frontend
               kubectl rollout status deployment/backend
          

