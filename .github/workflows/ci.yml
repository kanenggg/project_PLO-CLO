name: Docker Deployment

on:
  push:
    branches:
      - kan-ploclo

jobs:
  Build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest

      - name: Create network
        run: docker network create myapp-net || true
        
      - name: Stop old containers
        run: |
          docker stop postgres || true
          docker rm postgres || true
          docker stop backend || true
          docker rm backend || true
          docker stop frontend || true
          docker rm frontend || true

      - name: Run postgres
        run: |
          docker run -d \
            --name postgres \
            --network myapp-net \
            -e POSTGRES_PASSWORD=admin123 \
            -e POSTGRES_DB=myapp \
            -v pgdata:/var/lib/postgresql/data \
            postgres:15

      - name: Run backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
        run: |
          python3 << 'EOF'
          import os
          vars = ['JWT_SECRET','DB_PASSWORD','DATABASE_URL','GOOGLE_CLIENT_ID','GOOGLE_CLIENT_SECRET','GOOGLE_CALLBACK_URL']
          with open('/tmp/backend.env','w') as f:
              for v in vars:
                  f.write(f'{v}={os.environ[v]}\n')
              f.write('DB_HOST=postgres\nDB_PORT=5432\nDB_USER=postgres\nDB_NAME=myapp\nNODE_ENV=development\n')
          EOF
          docker run -d \
            --name backend \
            --network myapp-net \
            -p 9771:3001 \
            --env-file /tmp/backend.env \
            ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest

      - name: Run frontend
        run: |
          docker run -d \
            --name frontend \
            --network myapp-net \
            -p 3000:3000 \
            -e NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL}}\
            ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest