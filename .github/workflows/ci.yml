name: K8s Deployment

on:
  push:
    branches:
      - kan-ploclo

jobs:
  CI-git:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Clean Docker Image
        run: |
         docker image prune -a -f

  Build-Backend:
    needs: CI-git
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Push Backend
        run: |
          docker build --no-cache -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./PLOCLO_cms/backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

  Build-Frontend:
    needs: CI-git
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./PLOCLO_cms/frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

  CD-Deploy:
     needs: [Build-Backend, Build-Frontend]
     runs-on: self-hosted

     steps:
      - name: Deploy to K8s
        run: |
          kubectl apply -f ./PLOCLO_cms/k8s/namespace.yaml
          kubectl apply -f ./PLOCLO_cms/k8s/postgres/
          kubectl apply -f ./PLOCLO_cms/k8s/backend/
          kubectl apply -f ./PLOCLO_cms/k8s/frontend/
          kubectl apply -f ./PLOCLO_cms/k8s/ingress.yaml

      - name: Rollout restart (pull latest image)
        run: |
          kubectl rollout restart deployment/backend -n ploclo
          kubectl rollout restart deployment/frontend -n ploclo
          

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n ploclo --timeout=120s
          kubectl rollout status deployment/frontend -n ploclo --timeout=120s

  Robot-Test:
    needs: CD-Deploy
    runs-on: self-hosted
    steps:
       - name: Checkout code
         uses: actions/checkout@v4

       - name: Set up Python
         uses: actions/setup-python@v4
         with:
          python-version: '3.11'

       - name: Install dependencies
         run: |
          robot --outpudir results PLOCLO_cms/Robot-framework/venv/login_test

       - name: Upload Test Results
         uses: actions/upload-artifact@4
         if: always()
         with:
          name: robot-results
          path: results/

