name: workflow-tmas-scan

on:
    push:
        branches:
            - main

jobs:
    TMAS-SCAN:
        runs-on: self-hosted

        steps:
            - name: CheckOut
              uses: actions/checkout@v4

            - name: Login To Docker
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build Docker Images
              run: |
               docker compose -f PLOCLO_cms-main/docker-compose.yml build --no-cache

            - name: Scan Image with TMAS
              uses: trendmicro/tmas-scan-action@v3.1.0
              with:
               version: 'latest'
               vulnerabilitiesScan: true
               malwareScan: false
               artifact: |
                   registry:${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
                   registry:${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest
               additionalArgs: --region=ap-southeast-1
               tmasApiKey: ${{ secrets.VISION_ONE_API_KEY }}
               githubToken: ${{ secrets.GITHUB_TOKEN }}

            - name: Push Docker Image
              run: |
               docker push ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
               docker push ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest

            - name: Deploy Backend Container
              run: |
               docker stop backend || true
               docker rm backend || true
               docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
               docker run -d --name backend -p 9771:3001 ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
          
            - name: Deploy Frontend Container
              run: |
               docker stop frontend || true
               docker rm frontend || true
               docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest
               docker run -d --name frontend -p 9770:3000 ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest






