name: Docker Deployment

on:
  push:
    branches:
      - kan-ploclo

jobs:
  Build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Clean Docker Image
        run: |
         docker image prune -a -f

      - name: Build and Push Backend
        run: |
         docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest ./PLOCLO/backend
         docker push ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest

      - name: Build and Push Frontend
        run: |
         docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest ./PLOCLO/frontend
         docker push ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest

      - name: Deploy with docker compose
        run: |
         docker pull ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
         docker pull ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
         docker-compose -f ./docker-compose.yml up -d --build

      