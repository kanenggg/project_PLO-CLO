name: Docker Deployment

on:
  push:
    branches:
      - kan-ploclo

jobs:
  Build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest

      - name: Create network
        run: docker network create myapp-net || true
        
      - name: Stop old containers
        run: |
          docker stop postgres || true
          docker rm postgres || true
          docker stop backend || true
          docker rm backend || true
          docker stop frontend || true
          docker rm frontend || true

      - name: Run postgres
        run: |
          docker run -d \
            --name postgres \
            --network myapp-net \
            -e POSTGRES_PASSWORD=admin123 \
            -e POSTGRES_DB=myapp \
            -v pgdata:/var/lib/postgresql/data \
            postgres:15

      - name: Run backend
        run: |
          docker run -d \
            --name backend \
            --network myapp-net \
            -p 9771:3001 \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_USER=postgres \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e DB_NAME=myapp \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e JWT_SECRET=${{ secrets.JWT_SECRET }} \
            -e GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            -e GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            -e GOOGLE_CALLBACK_URL=${{ secrets.GOOGLE_CALLBACK_URL }} \
            -e NODE_ENV=development \
            ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest

      - name: Run frontend
        run: |
          docker run -d \
            --name frontend \
            --network myapp-net \
            -p 3000:3000 \
            -e NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL}}\
            ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest