name: Docker Deployment

on:
  push:
    branches:
      - kan-ploclo

jobs:
  Build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Pull images
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest

      - name: Create network
        run: docker network create myapp-net || true
        
      - name: Stop old containers
        run: |
          docker stop postgres || true
          docker rm postgres || true
          docker stop backend || true
          docker rm backend || true
          docker stop frontend || true
          docker rm frontend || true

      - name: Run postgres
        run: |
          docker run -d \
            --name postgres \
            --network myapp-net \
            -e POSTGRES_PASSWORD=admin123 \
            -e POSTGRES_DB=myapp \
            -v pgdata:/var/lib/postgresql/data \
            postgres:15

      - name: Run backend
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_CALLBACK_URL: ${{ secrets.GOOGLE_CALLBACK_URL }}
        run: |
           python3 -c "
           import os
           def clean(v):
                return os.environ.get(v,'').strip('\"').strip(\"'\")
                lines = [
               'DB_HOST=postgres',
               'DB_PORT=5432',
               'DB_USER=postgres',
               'DB_NAME=myapp',
               'NODE_ENV=development',
               'DB_PASSWORD=' + clean('DB_PASSWORD'),
               'DATABASE_URL=' + clean('DATABASE_URL'),
               'JWT_SECRET=' + clean('JWT_SECRET'),
               'GOOGLE_CLIENT_ID=' + clean('GOOGLE_CLIENT_ID'),
               'GOOGLE_CLIENT_SECRET=' + clean('GOOGLE_CLIENT_SECRET'),
               'GOOGLE_CALLBACK_URL=' + clean('GOOGLE_CALLBACK_URL'),
                ]
                open('/tmp/backend.env','w').write('\n'.join(lines))"

      - name: Run frontend
        run: |
            docker run -d \
            --name frontend \
            --network myapp-net \
            -p 3000:3000 \
            -e NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -e NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/ploclo_cms-main-frontend:latest