apiVersion: apps/v1
kind: Deployment          
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: kansumware/ploclo_cms-main-backend:latest
        ports:
        - containerPort: 3001
---
apiVersion: v1
kind: Service
metadata:
  name: backend-svc       
spec:
  type: NodePort
  selector:               
    app: backend
  ports:                  
  - port: 3001
    targetPort: 3001
    nodePort: 30000